---
- name: Ensure necessary tools are installed (Debian)
  become: yes
  apt:
    name:
      - wget
      - tar
    state: present
    update_cache: yes

- name: Download JMeter tar.gz archive
  become: yes
  get_url:
    url: "{{ jmeter_download_url }}"
    dest: /tmp/apache-jmeter.tgz

- name: Extract JMeter tar.gz archive
  become: yes
  unarchive:
    src: /tmp/apache-jmeter.tgz
    dest: /opt/
    remote_src: yes

- name: Create symlink for JMeter executable
  become: yes
  file:
    src: "{{ jmeter_install_dir }}/bin/jmeter"
    dest: "{{ jmeter_symlink_path }}"
    state: link
